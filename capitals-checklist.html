<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Capitals Checklist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding-bottom: 40px;
    }

    /* Sticky header */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #4f46e5;
      color: #fff;
      padding: 14px 16px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .counter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .counter-text {
      font-size: 0.85rem;
      min-width: 80px;
    }

    .progress-bg {
      flex: 1;
      background: rgba(255,255,255,0.25);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #a5f3fc;
      border-radius: 999px;
      transition: width 0.3s;
      width: 0%;
    }

    .reset-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    /* Search */
    .search-wrap {
      padding: 10px 16px 0;
      background: #4f46e5;
      position: sticky;
      top: 70px;
      z-index: 9;
    }

    .search-input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 10px;
    }

    /* Region header */
    .region {
      margin: 12px 12px 0;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .region-title {
      background: #ede9fe;
      color: #4f46e5;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 14px;
    }

    /* Row */
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .row:last-child { border-bottom: none; }
    .row:active { background: #f3f4f6; }
    .row.done { background: #f0fdf4; }

    .row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      flex-shrink: 0;
      cursor: pointer;
    }

    .flag { font-size: 1.4rem; flex-shrink: 0; }

    .info { flex: 1; min-width: 0; }

    .country {
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
    }

    .row.done .country { color: #15803d; }

    .capital {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 1px;
    }

    .row.done .capital { color: #16a34a; }

    /* Empty */
    .empty {
      text-align: center;
      padding: 40px 16px;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>🌍 Country Capitals Checklist</h1>
  <div class="counter-bar">
    <span class="counter-text" id="counter">0 / 196</span>
    <div class="progress-bg"><div class="progress-fill" id="fill"></div></div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="search-wrap">

<div id="list"></div>

  ]},

const TOTAL = DATA.reduce((s, r) => s + r.countries.length, 0);

// Safe localStorage wrapper — iOS Safari blocks it on file:// URLs
function storageGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) {}
}

let checked = new Set(JSON.parse(storageGet('cl_checked') || '[]'));

function save() { storageSet('cl_checked', JSON.stringify([...checked])); }

function updateCounter() {
  const n = checked.size;
  document.getElementById('counter').textContent = `${n} / ${TOTAL}`;
  document.getElementById('fill').style.width = (n / TOTAL * 100) + '%';
}

function setRowState(row, done) {
  row.classList.toggle('done', done);
  row.querySelector('input').checked = done;
}

function resetAll() {
  if (!confirm('Clear all checkboxes?')) return;
  checked.clear(); save();
  document.querySelectorAll('.row').forEach(r => setRowState(r, false));
  updateCounter();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  let any = false;

  DATA.forEach(({ region, countries }) => {
    const filtered = countries.filter(([,n,c]) =>
      !q || n.toLowerCase().includes(q) || c.toLowerCase().includes(q)
    );
    if (!filtered.length) return;
    any = true;

    const sec = document.createElement('div');
    sec.className = 'region';
    const title = document.createElement('div');
    title.className = 'region-title';
    title.textContent = region;
    sec.appendChild(title);

    filtered.forEach(([flag, name, capital]) => {
      const key = flag + name;
      const done = checked.has(key);

      const row = document.createElement('div');
      row.className = 'row' + (done ? ' done' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = done;

      const flagSpan = document.createElement('span');
      flagSpan.className = 'flag';
      flagSpan.textContent = flag;

      const info = document.createElement('div');
      info.className = 'info';
      const countryDiv = document.createElement('div');
      countryDiv.className = 'country';
      countryDiv.textContent = name;
      const capitalDiv = document.createElement('div');
      capitalDiv.className = 'capital';
      capitalDiv.textContent = capital;
      info.appendChild(countryDiv);
      info.appendChild(capitalDiv);

      row.appendChild(cb);
      row.appendChild(flagSpan);
      row.appendChild(info);

      function doToggle(newState) {
        cb.checked = newState;
        if (newState) checked.add(key); else checked.delete(key);
        save();
        row.classList.toggle('done', newState);
        updateCounter();
      }

      cb.addEventListener('change', () => doToggle(cb.checked));
      row.addEventListener('click', e => {
        if (e.target === cb) return;
        doToggle(!cb.checked);
      });

      sec.appendChild(row);
    });

    listEl.appendChild(sec);
  });

  if (!any) listEl.innerHTML = '<div class="empty">No results found.</div>';
  updateCounter();
}

render();
</script>
